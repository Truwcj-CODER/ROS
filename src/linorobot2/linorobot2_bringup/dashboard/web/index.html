<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robot Control</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- ── Left controls panel ─────────────────────────────────────────────────── -->
<aside id="panel-left">

  <div class="panel-header">
    <div class="app-title">
      <svg class="app-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="8" width="18" height="13" rx="3"/>
        <path d="M8 8V6a4 4 0 0 1 8 0v2"/>
        <circle cx="9" cy="14" r="1.5" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="14" r="1.5" fill="currentColor" stroke="none"/>
        <path d="M9 18h6" stroke-linecap="round"/>
      </svg>
      Robot Control
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="icon-btn" id="btn-theme" title="Toggle theme"></button>
      <div class="conn-indicator" id="conn-dot"></div>
    </div>
  </div>

  <!-- Status -->
  <div class="card">
    <div class="card-label">Status</div>
    <div id="status-badge" class="status-badge idle">
      <span class="badge-dot" id="badge-dot"></span>
      <span id="status-text">Idle</span>
    </div>
    <div id="nav-progress" class="nav-progress" style="display:none">
      <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      <span id="progress-label" class="progress-label"></span>
    </div>
  </div>

  <!-- Initial pose -->
  <button class="btn btn-pose" id="btn-pose">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>
      <line x1="12" y1="3" x2="12" y2="1"/><line x1="12" y1="23" x2="12" y2="21"/>
      <line x1="3" y1="12" x2="1" y2="12"/><line x1="23" y1="12" x2="21" y2="12"/>
    </svg>
    Set Initial Pose
  </button>

  <!-- Loop toggle -->
  <div class="card">
    <div class="toggle-row">
      <div class="toggle-text">
        <div class="toggle-title">Loop patrol</div>
        <div class="toggle-sub">Repeat continuously</div>
      </div>
      <label class="ios-toggle">
        <input type="checkbox" id="chk-loop">
        <span class="ios-toggle-track">
          <span class="ios-toggle-thumb"></span>
        </span>
      </label>
    </div>
  </div>

  <div class="spacer"></div>

  <!-- Action buttons -->
  <button class="btn btn-go" id="btn-go">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
    Go
  </button>
  <button class="btn btn-stop" id="btn-stop">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    Stop
  </button>
  <button class="btn btn-clear" id="btn-clear">Clear</button>

  <div class="hint">Tap map to add waypoints</div>

</aside>

<!-- ── Map ─────────────────────────────────────────────────────────────────── -->
<main id="map-wrap">
  <canvas id="c"></canvas>
  <div id="no-map">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
      <path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0 0 21 18.382V7.618a1 1 0 0 0-.553-.894L15 4m0 13V4M9 7l6-3"/>
    </svg>
    <p>No map loaded</p>
    <span>Check --map argument</span>
  </div>
</main>

<!-- ── Right waypoints panel ───────────────────────────────────────────────── -->
<aside id="panel-right">

  <div class="panel-header">
    <div class="app-title" style="font-size:13px">Waypoints</div>
    <span id="wp-count" class="wp-count-badge" style="display:none"></span>
  </div>

  <div id="wp-list">
    <div class="wp-empty" id="wp-empty">No waypoints yet</div>
  </div>

</aside>

<script src="/static/js/app.js"></script>
</body>
</html>
